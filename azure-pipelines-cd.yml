trigger: none

resources:
  pipelines:
  - pipeline: ciPipeline
    source: azure-pipelines.yml
    trigger:
      branches:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
- download: ciPipeline
  artifact: drop

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Azure subscription 1'
    appName: 'mysamplens12345'
    package: '$(Pipeline.Workspace)/ciPipeline/drop/app.zip'
    runtimeStack: 'NODE|22-lts'