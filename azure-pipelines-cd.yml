trigger:
- main

variables:
  azureSubscription: 'Azure subscription 1(fcbc5c99-308d-47ee-9f19-c7f282444dc6)'
  webAppName: 'mysamplens12345'
  vmImageName: 'ubuntu-latest'

stages:

# =======================
# BUILD STAGE (CI)
# =======================
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
        npm run build --if-present
      displayName: 'Install and Build (NO TEST STEP)'

    # Create ZIP artifact (required for deployment)
    - task: ArchiveFiles@2
      displayName: 'Archive Application'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: drop


# =======================
# DEPLOY STAGE (CD)
# =======================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployWeb
    pool:
      vmImage: $(vmImageName)

    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/app.zip'
              runtimeStack: 'NODE|22-lts'
              startUpCommand: 'node app.js'